databases:
  - name: bug-tracker-db
    plan: free
    databaseName: student_bug_tracker
    user: bugtracker

services:
  # ── Backend API ──
  - type: web
    name: bug-tracker-api
    runtime: node
    plan: free
    rootDir: backend
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: "postgresql://postgres.earwybppkswgemvjyjau:Yashwanth%405152@aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: FRONTEND_URL
        value: https://bug-tracker-ui.onrender.com
      - key: RENDER_EXTERNAL_URL
        value: https://bug-tracker-api-d117.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: kutikantiyashwanth@gmail.com
      - key: SMTP_PASS
        value: cdmdsulhtwvpjqpr
      - key: EMAIL_FROM
        value: "BugTracker <noreply@yashwanthkutikanti.in>"
      - key: RESEND_API_KEY
        value: "re_HkxU4GTf_MCPUHATT69uZXjtvFugispiM"

  # ── Frontend UI (Static Site) ──
  - type: static
    name: bug-tracker-ui
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: out
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_URL
        value: https://bug-tracker-api-d117.onrender.com/api/v1
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://bug-tracker-api-d117.onrender.com
