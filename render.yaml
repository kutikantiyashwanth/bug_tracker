databases:
  - name: bug-tracker-db
    plan: free
    databaseName: student_bug_tracker
    user: bugtracker

services:
  # ── Backend API ──
  - type: web
    name: bug-tracker-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && (npx ts-node --transpile-only prisma/seed-simple.ts || true)
    startCommand: npx ts-node --transpile-only --skip-project src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: bug-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: REDIS_URL
        value: ""
      - key: FRONTEND_URL
        value: https://bug-tracker-ui.onrender.com

  # ── Frontend UI ──
  - type: web
    name: bug-tracker-ui
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && rm -rf .next && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_URL
        value: https://bug-tracker-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://bug-tracker-api.onrender.com
