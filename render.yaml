databases:
  - name: bug-tracker-db
    plan: free
    databaseName: student_bug_tracker
    user: bugtracker

services:
  # ── Backend API ──
  - type: web
    name: bug-tracker-api
    runtime: node
    plan: free
    rootDir: backend
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: bug-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: REDIS_URL
        value: ""
      - key: FRONTEND_URL
        value: https://bug-tracker-ui.onrender.com

  # ── Frontend UI ──
  - type: web
    name: bug-tracker-ui
    runtime: node
    plan: free
    rootDir: frontend
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_URL
        value: https://bug-tracker-api-uz41.onrender.com/api/v1
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://bug-tracker-api-uz41.onrender.com
